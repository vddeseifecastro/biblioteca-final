<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 80px;
            margin-bottom: 10px;
            color: #e74c3c;
        }

        h1 {
            margin-top: 0;
            font-size: 32px;
            color: #333;
        }

        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        a {
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            transition: 0.3s ease;
        }

        .btn-home {
            background: #3498db;
            color: white;
        }

        .btn-home:hover {
            background: #2980b9;
        }

        .btn-back {
            background: #95a5a6;
            color: white;
        }

        .btn-back:hover {
            background: #7f8c8d;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="icon">⚠️</div>

        <h1>Error</h1>

        <p>{{ .error }}</p>

        <div class="buttons">
            <a href="javascript:history.back()" class="btn-back">⬅ Volver atrás</a>
            <a href="/dashboard" class="btn-home">🏠 Ir al Inicio</a>
        </div>
    </div>

</body>
</html>
