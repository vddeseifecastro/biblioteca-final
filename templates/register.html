<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Biblioteca Digital</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            background: #f6f7fb;
            font-family: "Inter", sans-serif;
        }

        /* Modo oscuro automático */
        @media (prefers-color-scheme: dark) {
            body { background: #121212; }
            .register-box { background: #1e1e1e !important; color: #fff; }
            .form-control {
                background: #2b2b2b;
                border-color: #444;
                color: #fff;
            }
            .form-control:focus {
                background: #303030;
                border-color: #6ea8fe;
            }
            .text-muted { color: #cfcfcf !important; }
            .left-side img { filter: brightness(0.85) invert(1); }
        }

        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
            text-align: center;
        }

        .left-side img {
            max-width: 70%;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .right-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .register-box {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.1);
            animation: fadeInUp .7s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-register {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            color: white;
        }

        .btn-register:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        /* Responsive */
        @media(max-width: 900px) {
            .left-side { display: none; }
            body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            .right-side { flex: 1; }
        }
    </style>
</head>

<body>

<!-- LADO ILUSTRACIÓN -->
<div class="left-side">
    <div>
        <h1 class="mb-4 fw-bold">Únete a la Biblioteca Digital</h1>
        <p class="lead">Crea tu cuenta y accede a un mundo de conocimiento.</p>
        <img src="/static/images/undraw_reading-time_gcvc.svg" alt="Reading Illustration">
    </div>
</div>

<!-- LADO REGISTRO -->
<div class="right-side">
    <div class="register-box">

        <div class="text-center mb-4">
            <i class="fas fa-user-plus fa-3x mb-3" style="color:#667eea;"></i>
            <h2 class="fw-bold">Crear Cuenta</h2>
            <p class="text-muted">Regístrate como bibliotecario</p>
        </div>

        {{if .error}}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{.error}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
        {{end}}

        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-id-card me-1"></i> Nombre Completo</label>
                <input type="text" class="form-control" name="name" placeholder="Juan Pérez" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user me-1"></i> Nombre de Usuario</label>
                <input type="text" class="form-control" name="username" placeholder="juanperez" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="fas fa-envelope me-1"></i> Email</label>
                <input type="email" class="form-control" name="email" placeholder="juan@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="fas fa-lock me-1"></i> Contraseña</label>
                <input type="password" class="form-control" name="password" placeholder="••••••••" required>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-register">
                    <i class="fas fa-user-plus me-2"></i> Registrarse
                </button>
            </div>
        </form>

        <div class="text-center mt-4">
            <a href="/login" class="btn btn-outline-secondary w-100">
                <i class="fas fa-arrow-left me-2"></i> Volver al Login
            </a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
