<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Libro - Biblioteca Digital</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: #f8f9fa; 
    }
    .navbar-custom { 
        background: linear-gradient(135deg, #667eea, #764ba2); 
    }
    .card { 
        border-radius: 10px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        margin-bottom: 20px; 
    }
    .cover-preview { 
        width: 100%; 
        max-height: 300px; 
        object-fit: contain; 
        border-radius: 10px; 
        margin-bottom: 15px; 
    }
    .btn-primary {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none;
        border-radius: 8px;
    }
    .btn-primary:hover {
        background: linear-gradient(135deg, #5b6dd6, #6a4095);
    }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard"><i class="fas fa-book-open me-2"></i><strong>Biblioteca Digital</strong></a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text me-3"><i class="fas fa-user me-1"></i>{{.name}} ({{.username}})</span>
            <a class="btn btn-outline-light btn-sm" href="/logout" title="Cerrar sesión"><i class="fas fa-sign-out-alt me-1"></i> Salir</a>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-edit me-2"></i>Editar Libro</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a href="/books/{{.book.ID}}" class="btn btn-outline-secondary me-2" title="Ver libro"><i class="fas fa-eye me-1"></i> Ver</a>
            <a href="/books" class="btn btn-outline-secondary" title="Volver a la lista"><i class="fas fa-arrow-left me-1"></i> Volver</a>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header"><h5 class="card-title mb-0"><i class="fas fa-info-circle me-2"></i> Editar Información</h5></div>
                <div class="card-body">
                    {{if .error}}<div class="alert alert-danger">{{.error}}</div>{{end}}
                    <form method="POST" action="/books/{{.book.ID}}" enctype="multipart/form-data">
                        
                        <!-- Imagen actual / preview -->
                        <label class="form-label"><i class="fas fa-image me-1"></i> Portada Actual</label>
                        <img id="coverPreview" src="{{.book.CoverImage}}" alt="Portada" class="cover-preview">

                        <!-- Subida nueva imagen -->
                        <div class="mb-3">
                            <label for="coverImageFile" class="form-label">Cambiar Portada</label>
                            <input type="file" class="form-control" id="coverImageFile" name="coverImage" accept="image/*">
                            <small class="form-text text-muted">Formatos permitidos: jpg, jpeg, png</small>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="ISBN" class="form-label"><i class="fas fa-barcode me-1"></i> ISBN *</label>
                                <input type="text" class="form-control" id="ISBN" name="ISBN" value="{{.book.ISBN}}" required readonly>
                                <div class="form-text">El ISBN no puede ser modificado</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="Title" class="form-label"><i class="fas fa-heading me-1"></i> Título *</label>
                                <input type="text" class="form-control" id="Title" name="Title" value="{{.book.Title}}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="Author" class="form-label"><i class="fas fa-user-edit me-1"></i> Autor *</label>
                                <input type="text" class="form-control" id="Author" name="Author" value="{{.book.Author}}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="Category" class="form-label"><i class="fas fa-tag me-1"></i> Categoría *</label>
                                <input type="text" class="form-control" id="Category" name="Category" value="{{.book.Category}}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="Description" class="form-label"><i class="fas fa-align-left me-1"></i> Descripción</label>
                            <textarea class="form-control" id="Description" name="Description" rows="3">{{.book.Description}}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="Publisher" class="form-label"><i class="fas fa-building me-1"></i> Editorial</label>
                                <input type="text" class="form-control" id="Publisher" name="Publisher" value="{{.book.Publisher}}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="PublishedAt" class="form-label"><i class="fas fa-calendar me-1"></i> Fecha Publicación</label>
                                <input type="date" class="form-control" id="PublishedAt" name="PublishedAt" 
                                       {{if .book.PublishedAt}} value="{{.book.PublishedAt.Format "2006-01-02"}}" {{end}}>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="Pages" class="form-label"><i class="fas fa-file-alt me-1"></i> Páginas</label>
                                <input type="number" class="form-control" id="Pages" name="Pages" value="{{.book.Pages}}" min="1">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="Language" class="form-label"><i class="fas fa-language me-1"></i> Idioma</label>
                                <input type="text" class="form-control" id="Language" name="Language" value="{{.book.Language}}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="Stock" class="form-label"><i class="fas fa-boxes me-1"></i> Stock *</label>
                                <input type="number" class="form-control" id="Stock" name="Stock" value="{{.book.Stock}}" min="1" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="Available" class="form-label"><i class="fas fa-check-circle me-1"></i> Disponibles *</label>
                                <input type="number" class="form-control" id="Available" name="Available" value="{{.book.Available}}" min="0" max="{{.book.Stock}}" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="/books" class="btn btn-outline-secondary"><i class="fas fa-times me-1"></i> Cancelar</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Actualizar Libro
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Preview dinámico de la imagen -->
<script>
document.getElementById('coverImageFile').addEventListener('change', function(event){
    const [file] = event.target.files;
    if (file) {
        const reader = new FileReader();
        reader.onload = e => document.getElementById('coverPreview').src = e.target.result;
        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
