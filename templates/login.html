<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Biblioteca Digital</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            background: #f6f7fb;
            font-family: "Inter", sans-serif;
        }

        /* Modo oscuro automático */
        @media (prefers-color-scheme: dark) {
            body { background: #121212; }
            .login-box { background: #1e1e1e !important; color: #fff; }
            .form-control {
                background: #2b2b2b;
                border-color: #444;
                color: #fff;
            }
            .form-control:focus {
                background: #303030;
                border-color: #6ea8fe;
            }
            .text-muted { color: #cfcfcf !important; }
            .left-side img { filter: brightness(0.85) invert(1); }
        }

        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
            text-align: center;
        }

        .left-side img {
            max-width: 70%;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .right-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.1);
            animation: fadeInUp .7s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botón con gradiente igual que 'Registrarse' */
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 10px;
            font-weight: 600;
            color: white;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .btn-register-link {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 8px;
            font-size: 0.9rem;
            border-radius: 10px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: inline-block;
        }
        .btn-register-link:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .toggle-password {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }

        /* Responsive */
        @media(max-width: 900px) {
            .left-side { display: none; }
            body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            .right-side { flex: 1; }
        }
    </style>
</head>

<body>

<!-- LADO ILUSTRACIÓN -->
<div class="left-side">
    <div>
        <h1 class="mb-4 fw-bold">Bienvenido a la Biblioteca Digital</h1>
        <p class="lead">Accede a un mundo de conocimiento, lectura y aprendizaje.</p>
        <img src="/static/images/undraw_books_wxzz.svg" alt="Reading Illustration">
    </div>
</div>

<!-- LADO LOGIN -->
<div class="right-side">
    <div class="login-box">

        <div class="text-center mb-4">
            <i class="fas fa-book-open fa-3x mb-3" style="color:#667eea;"></i>
            <h2 class="fw-bold">Iniciar Sesión</h2>
            <p class="text-muted">Bienvenido de nuevo</p>
        </div>

        {{if .error}}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{.error}}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {{end}}

        <form method="POST" action="/login">
            <div class="mb-3 position-relative">
                <label class="form-label fw-semibold"><i class="fas fa-user me-1"></i> Usuario</label>
                <input type="text" class="form-control" name="username" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="mb-3 position-relative">
                <label class="form-label fw-semibold"><i class="fas fa-lock me-1"></i> Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i> Entrar
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted mb-1">¿No tienes cuenta?</p>
            <a href="/register" class="btn btn-register-link w-100">
                <i class="fas fa-user-plus me-1"></i> Regístrate aquí
            </a>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const field = document.getElementById("password");
        field.type = field.type === "password" ? "text" : "password";
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
