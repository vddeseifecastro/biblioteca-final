<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo Libro - Biblioteca Digital</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    .custom-navbar {
        background: linear-gradient(135deg, #667eea, #764ba2) !important;
        box-shadow: 0 3px 10px #0003;
    }
    .header-gradient {
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 18px 25px;
        border-radius: 12px;
        color: white;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 4px 12px #0003;
    }
    .header-gradient h3 { margin: 0; font-weight: 600; }
    body { background: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { border-radius: 1rem; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .btn-gradient {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white !important;
        font-weight: 600;
        border: none;
        border-radius: 10px;
    }
    .btn-gradient:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px #0004;
        color: white !important;
    }
    .book-cover-placeholder {
        width: 100%;
        height: 280px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 3rem;
        box-shadow: inset 0 0 10px #0003;
    }
    .book-cover-placeholder img {
        max-width: 100%;
        max-height: 100%;
        border-radius: 12px;
        object-fit: cover;
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="fas fa-book me-2"></i> Biblioteca
        </a>
        <div class="navbar-nav ms-auto">
            <a class="btn btn-outline-light btn-sm" href="/logout">
                <i class="fas fa-sign-out-alt me-1"></i> Salir
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="header-gradient">
        <i class="fas fa-plus-circle fa-lg"></i>
        <h3>Agregar Nuevo Libro</h3>
    </div>

    <div class="row g-4">
        
        <!-- FORMULARIO PRINCIPAL -->
        <div class="col-lg-7">
            <div class="card p-4">

                {{if .error}}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{.error}}
                    <button class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {{end}}

                <form action="/books" method="POST" enctype="multipart/form-data">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="title" class="form-label">Título *</label>
                            <input type="text" id="title" name="title" class="form-control" required placeholder="Ej: El Principito">
                        </div>

                        <div class="col-md-6">
                            <label for="author" class="form-label">Autor *</label>
                            <input type="text" id="author" name="author" class="form-control" required placeholder="Ej: Antoine de Saint-Exupéry">
                        </div>

                        <div class="col-md-6">
                            <label for="isbn" class="form-label">ISBN *</label>
                            <input type="text" id="isbn" name="isbn" class="form-control" required placeholder="Ej: 978-84-376-0494-7">
                        </div>

                        <div class="col-md-6">
                            <label for="category" class="form-label">Categoría *</label>
                            <select id="category" name="category" class="form-select" required aria-label="Selecciona una categoría">
                                <option value="" disabled selected>Selecciona una categoría</option>
                                <option>Ficción</option>
                                <option>Novela</option>
                                <option>Infantil</option>
                                <option>Juvenil</option>
                                <option>Educación</option>
                                <option>Ciencia</option>
                                <option>Historia</option>
                                <option>Fantasía</option>
                                <option>Terror</option>
                                <option>Romance</option>
                                <option>Autoayuda</option>
                                <option>Computación</option>
                                <option>Biografías</option>
                                <option>Arte</option>
                                <option>Diccionarios</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label">Descripción</label>
                            <textarea id="description" name="description" class="form-control" rows="3" placeholder="Breve resumen del libro..."></textarea>
                        </div>

                        <div class="col-md-4">
                            <label for="publisher" class="form-label">Editorial</label>
                            <input type="text" id="publisher" name="publisher" class="form-control" placeholder="Ej: Santillana">
                        </div>

                        <div class="col-md-4">
                            <label for="publishedAt" class="form-label">Fecha de publicación</label>
                            <input type="date" id="publishedAt" name="publishedAt" class="form-control">
                        </div>

                        <div class="col-md-4">
                            <label for="pages" class="form-label">Páginas</label>
                            <input type="number" id="pages" name="pages" class="form-control" placeholder="Ej: 256">
                        </div>

                        <div class="col-md-6">
                            <label for="language" class="form-label">Idioma *</label>
                            <select id="language" name="language" class="form-select" required aria-label="Selecciona un idioma">
                                <option value="" disabled selected>Selecciona un idioma</option>
                                <option>Español</option>
                                <option>Inglés</option>
                                <option>Francés</option>
                                <option>Alemán</option>
                                <option>Italiano</option>
                                <option>Portugués</option>
                                <option>Chino</option>
                                <option>Japonés</option>
                                <option>Coreano</option>
                                <option>Ruso</option>
                                <option>Árabe</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="stock" class="form-label">Stock</label>
                            <input type="number" id="stock" name="stock" class="form-control" value="1">
                        </div>

                        <div class="col-12">
                            <label for="coverImage" class="form-label">Imagen de portada</label>
                            <input type="file" id="coverImage" name="coverImage" class="form-control" accept="image/*">
                        </div>

                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="/books" class="btn btn-outline-secondary" type="button">
                            <i class="fas fa-arrow-left me-1"></i> Cancelar
                        </a>

                        <button type="submit" class="btn btn-gradient">
                            <i class="fas fa-save me-1"></i> Guardar Libro
                        </button>
                    </div>

                </form>
            </div>
        </div>

        <!-- VISTA PREVIA -->
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0"><i class="fas fa-eye me-2"></i> Vista Previa</h6>
                </div>

                <div class="card-body text-center">
                    <div class="book-cover-placeholder mb-3" id="preview-cover">
                        <i class="fas fa-book"></i>
                    </div>

                    <h5 id="preview-title" class="text-muted">Título del libro</h5>
                    <p id="preview-author" class="text-muted">Autor del libro</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const coverInput = document.getElementById("coverImage");
const previewCover = document.getElementById("preview-cover");
coverInput.addEventListener("change", () => {
    const file = coverInput.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = e => {
            previewCover.innerHTML = `<img src="${e.target.result}" alt="Portada">`;
        };
        reader.readAsDataURL(file);
    } else {
        previewCover.innerHTML = `<i class="fas fa-book"></i>`;
    }
});

const titleInput = document.getElementById("title");
const authorInput = document.getElementById("author");
const previewTitle = document.getElementById("preview-title");
const previewAuthor = document.getElementById("preview-author");

titleInput.addEventListener("input", () => {
    previewTitle.textContent = titleInput.value || "Título del libro";
});
authorInput.addEventListener("input", () => {
    previewAuthor.textContent = authorInput.value || "Autor del libro";
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
